[[repos]]
repo = "builtin"
hooks = [
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
    { id = "check-yaml" },
    { id = "check-toml" }
]

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo-fmt", entry = "cargo fmt --all --", language = "system", types = ["rust"], pass_filenames = false }
]
